[project]
name = "eip1559-portable-cli"
authors = ["EIP-1559 Team"]
description = "A portable CLI for simulating and analyzing Ethereum transaction fee dynamics"
telemetry = false
requirements = []
[contracts.eip1559-base]
path = "contracts/eip1559-base.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
